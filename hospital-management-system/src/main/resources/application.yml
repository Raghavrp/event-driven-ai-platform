server:
  port: 8081

spring:
  application:
    name: hospital-management-system

  # ── H2 In-Memory Database ─────────────────────────────────────────
  # H2 is embedded — no installation needed. Data resets on restart.
  # Great for demos and interviews.
  datasource:
    url: jdbc:h2:mem:hospitaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop        # auto creates tables on start, drops on stop
    show-sql: true                 # prints SQL queries in console (helpful for demos)
    properties:
      hibernate:
        format_sql: true

  # H2 Web Console — visit http://localhost:8081/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── Redis Cache ────────────────────────────────────────────────────
  # Falls back to simple in-memory cache if Redis is not running
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000          # 10 minutes default TTL

# ── JWT Security ──────────────────────────────────────────────────────
security:
  jwt:
    secret: 7A25432A462D4A614E645267556B58703273357638792F423F4528482B4D6251
    expiration: 86400000            # 24 hours

# ── Swagger UI ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────
logging:
  level:
    com.raghavrp.hospital: DEBUG
    org.springframework.security: INFO

# ── Actuator ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
